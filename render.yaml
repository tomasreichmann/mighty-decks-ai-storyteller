services:
  - type: web
    name: mighty-decks-ai-storyteller
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: corepack enable && rm -rf node_modules apps/web/node_modules apps/server/node_modules spec/node_modules && NODE_ENV=development pnpm install --frozen-lockfile --force --config.production=false && pnpm -C apps/web build
    startCommand: pnpm -C apps/server serve
    envVars:
      - key: DEBUG_MODE
        value: "false"
      - key: MAX_ACTIVE_ADVENTURES
        value: "1"
