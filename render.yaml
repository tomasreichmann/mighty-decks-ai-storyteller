services:
  - type: web
    name: mighty-decks-ai-storyteller
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false --force && pnpm -C apps/web build
    startCommand: pnpm -C apps/server serve
    envVars:
      - key: DEBUG_MODE
        value: "false"
      - key: MAX_ACTIVE_ADVENTURES
        value: "1"
