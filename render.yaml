services:
  - type: web
    name: mighty-decks-ai-storyteller
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: corepack enable && rm -rf node_modules apps/web/node_modules apps/server/node_modules spec/node_modules apps/web/dist && pnpm install --frozen-lockfile --prod=false --store-dir /tmp/pnpm-store && NODE_ENV=production pnpm -C apps/web build --mode production
    startCommand: NODE_ENV=production pnpm -C apps/server serve
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: DEBUG_MODE
        value: "false"
      - key: MAX_ACTIVE_ADVENTURES
        value: "1"
